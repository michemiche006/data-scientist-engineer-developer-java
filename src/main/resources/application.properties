spring.application.name=data-scientist-engineer-developer-java
server.port=${SERVER_PORT:3000}

app.bedrock.region=${BEDROCK_AWS_REGION:${AWS_REGION:us-east-1}}
app.bedrock.chat-model-id=${BEDROCK_CHAT_MODEL_ID:us.amazon.nova-lite-v1:0}
app.bedrock.embeddings-model-id=${BEDROCK_EMBEDDINGS_MODEL_ID:amazon.titan-embed-text-v2:0}
app.vector.collection-name=${VECTOR_COLLECTION_NAME:tech-content-vectors}
app.vector.dimension=${VECTOR_DIMENSION:1024}
